name = "koi-sensei-personal"
main = "src/index.ts"
compatibility_date = "2026-07-17"

[vars]
KOI_DAILY_REQUEST_LIMIT = "100"
KOI_BETA_ENABLED = "false"

[durable_objects]
bindings = [
  { name = "KOI_USER", class_name = "KoiUserObject" },
  { name = "KOI_GLOBAL", class_name = "KoiGlobalObject" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["KoiUserObject", "KoiGlobalObject"]
