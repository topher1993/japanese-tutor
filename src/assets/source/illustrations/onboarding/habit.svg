<!--
  Onboarding Panel C — Daily habit (base scene, NO kanji overlay).
  Scene: workplace desk at evening, calendar/planner open, single ~10-min block circled, small lantern.
  Output: src/assets/source/illustrations/onboarding/habit.svg -> habit.png (320x480)

  palette (ds.colors only):
    ds.colors.brand (#2A6F97) - planner grid
    ds.colors.brandDark (#014F86) - planner cover
    ds.colors.warm (#F4A261) - lantern body + warm circle
    ds.colors.warmSoft (#FFF4E6) - lantern glow + planner page
    ds.colors.warmInk (#92400E) - lantern frame + planner text
    ds.colors.textMuted (#64748B) - desk surface
    ds.colors.text (#0F172A) - outlines

  Continuity lock: <symbol id="desk-silhouette"> block is IDENTICAL across all 6 onboarding files.
  DO NOT edit the <symbol> below without copy-pasting the change to the other 5 files.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 480" width="320" height="480" role="img" aria-label="Onboarding Step 4 Habit: workplace desk in evening light, an open calendar with a single ten-minute block circled, a small lantern casting warm light">
  <defs>
    <symbol id="desk-silhouette" viewBox="0 0 320 200">
      <rect x="8" y="8" width="80" height="48" rx="4" fill="#FFF4E6" stroke="#92400E" stroke-width="2" stroke-linecap="round"/>
      <line x1="48" y1="8" x2="48" y2="56" stroke="#92400E" stroke-width="2" stroke-linecap="round"/>
      <line x1="8" y1="32" x2="88" y2="32" stroke="#92400E" stroke-width="2" stroke-linecap="round"/>
      <rect x="0" y="120" width="320" height="20" fill="#64748B" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>
      <line x1="0" y1="140" x2="320" y2="140" stroke="#0F172A" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <rect x="20" y="140" width="8" height="60" fill="#64748B" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/>
      <rect x="292" y="140" width="8" height="60" fill="#64748B" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/>
    </symbol>
  </defs>

  <!-- Evening warmth wash (top-right where lantern sits) -->
  <ellipse cx="252" cy="190" rx="140" ry="120" fill="#FFF4E6" opacity="0.55"/>

  <!-- Shared desk silhouette (continuity lock) -->
  <use href="#desk-silhouette" x="0" y="280" width="320" height="200"/>

  <!-- Calendar / planner open (focal, center-frame) -->
  <g transform="translate(50 200)">
    <!-- Planner cover underneath (slight angle for "open book" feel) -->
    <path d="M 0 20 L 220 16 L 220 156 L 0 160 Z" fill="#014F86" stroke="#0F172A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Planner page -->
    <rect x="8" y="20" width="204" height="132" fill="#FFF4E6" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/>
    <!-- Day-of-week column labels (micro) -->
    <line x1="50" y1="40" x2="50" y2="140" stroke="#64748B" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="100" y1="40" x2="100" y2="140" stroke="#64748B" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="150" y1="40" x2="150" y2="140" stroke="#64748B" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="200" y1="40" x2="200" y2="140" stroke="#64748B" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="8" y1="65" x2="212" y2="63" stroke="#64748B" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="8" y1="90" x2="212" y2="88" stroke="#64748B" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="8" y1="115" x2="212" y2="113" stroke="#64748B" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Circled 10-min block (identity lock per Beru) -->
    <ellipse cx="125" cy="76" rx="20" ry="14" fill="none" stroke="#F4A261" stroke-width="4" stroke-linecap="round"/>
    <text x="125" y="82" font-family="Noto Sans JP, sans-serif" font-size="14" font-weight="700" fill="#92400E" text-anchor="middle">10分</text>
  </g>

  <!-- Lantern (top-right, warm-light motif) -->
  <g transform="translate(252 160)">
    <!-- Lantern body (paper-lantern shape) -->
    <ellipse cx="0" cy="20" rx="22" ry="26" fill="#F4A261" stroke="#92400E" stroke-width="3" stroke-linecap="round"/>
    <!-- Top cap -->
    <rect x="-12" y="-8" width="24" height="6" rx="2" fill="#92400E" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/>
    <!-- Bottom cap -->
    <rect x="-10" y="44" width="20" height="6" rx="2" fill="#92400E" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/>
    <!-- Hanging string -->
    <line x1="0" y1="-8" x2="0" y2="-20" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/>
    <!-- Vertical rib lines -->
    <line x1="-14" y1="0" x2="-14" y2="40" stroke="#92400E" stroke-width="1.5" opacity="0.6"/>
    <line x1="14" y1="0" x2="14" y2="40" stroke="#92400E" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="-4" x2="0" y2="44" stroke="#92400E" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Pen (foreground-left, optional Beru flexibility) -->
  <g transform="translate(28 396) rotate(-18)">
    <rect x="0" y="0" width="56" height="6" rx="2" fill="#F4A261" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/>
    <path d="M 56 0 L 64 3 L 56 6 Z" fill="#0F172A"/>
  </g>
</svg>
