<!--
  Onboarding Panel A — Welcome FINAL (base scene + kanji overlay).
  Mirrors welcome.svg + adds the 日本語 / あいう headline that the user sees.
  Output: src/assets/source/illustrations/onboarding/welcome-final.svg -> welcome-final.png (320x480)

  Continuity lock: <symbol id="desk-silhouette"> block is IDENTICAL across all 6 onboarding files.
  DO NOT edit the <symbol> below without copy-pasting the change to the other 5 files.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 480" width="320" height="480" role="img" aria-label="Onboarding Step 1 Welcome final: workplace desk scene with the 日本語 Japanese wordmark and a single hiragana character displayed on the laptop screen">
  <defs>
    <symbol id="desk-silhouette" viewBox="0 0 320 200">
      <rect x="8" y="8" width="80" height="48" rx="4" fill="#FFF4E6" stroke="#92400E" stroke-width="2" stroke-linecap="round"/>
      <line x1="48" y1="8" x2="48" y2="56" stroke="#92400E" stroke-width="2" stroke-linecap="round"/>
      <line x1="8" y1="32" x2="88" y2="32" stroke="#92400E" stroke-width="2" stroke-linecap="round"/>
      <rect x="0" y="120" width="320" height="20" fill="#64748B" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>
      <line x1="0" y1="140" x2="320" y2="140" stroke="#0F172A" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <rect x="20" y="140" width="8" height="60" fill="#64748B" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/>
      <rect x="292" y="140" width="8" height="60" fill="#64748B" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/>
    </symbol>
  </defs>

  <!-- Soft daylight warmth wash -->
  <ellipse cx="48" cy="32" rx="120" ry="60" fill="#FFF4E6" opacity="0.7"/>

  <!-- Shared desk silhouette (continuity lock) -->
  <use href="#desk-silhouette" x="0" y="280" width="320" height="200"/>

  <!-- Laptop with あ (now bright, not faded) -->
  <g transform="translate(110 240)">
    <path d="M 0 80 L 110 80 L 120 100 L -10 100 Z" fill="#014F86" stroke="#0F172A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="6" y="0" width="100" height="80" rx="4" fill="#2A6F97" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>
    <rect x="14" y="8" width="84" height="64" fill="#FFFFFF" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/>
    <text x="56" y="56" font-family="Noto Sans JP, sans-serif" font-size="40" font-weight="700" fill="#2A6F97" text-anchor="middle">あ</text>
  </g>

  <!-- Coffee mug -->
  <g transform="translate(220 320)">
    <rect x="0" y="0" width="50" height="56" rx="4" fill="#F4A261" stroke="#0F172A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <ellipse cx="25" cy="0" rx="25" ry="6" fill="#7C2D12" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/>
    <path d="M 50 12 C 68 14 68 38 50 40" fill="none" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>
    <path d="M 16 -10 C 18 -18 14 -22 16 -30" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <path d="M 30 -8 C 32 -16 28 -20 30 -28" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Kanji overlay (the headline that lands on the final PNG) -->
  <g>
    <!-- Japanese wordmark (background soft shadow) -->
    <text x="160" y="100" font-family="Noto Sans JP, sans-serif" font-size="56" font-weight="900" fill="#0F172A" text-anchor="middle" opacity="0.18">日本語</text>
    <text x="160" y="96" font-family="Noto Sans JP, sans-serif" font-size="56" font-weight="900" fill="#FFFFFF" text-anchor="middle">日本語</text>
    <!-- Hiragana trio (a-i-u) — same anchor as existing compositeKanji layer -->
    <text x="120" y="180" font-family="Noto Sans JP, sans-serif" font-size="44" font-weight="900" fill="#0F172A" text-anchor="middle" opacity="0.18">あ</text>
    <text x="120" y="178" font-family="Noto Sans JP, sans-serif" font-size="44" font-weight="900" fill="#2A6F97" text-anchor="middle">あ</text>
    <text x="200" y="180" font-family="Noto Sans JP, sans-serif" font-size="44" font-weight="900" fill="#0F172A" text-anchor="middle" opacity="0.18">い</text>
    <text x="200" y="178" font-family="Noto Sans JP, sans-serif" font-size="44" font-weight="900" fill="#2A6F97" text-anchor="middle">い</text>
    <text x="280" y="180" font-family="Noto Sans JP, sans-serif" font-size="44" font-weight="900" fill="#0F172A" text-anchor="middle" opacity="0.18">う</text>
    <text x="280" y="178" font-family="Noto Sans JP, sans-serif" font-size="44" font-weight="900" fill="#2A6F97" text-anchor="middle">う</text>
  </g>
</svg>
