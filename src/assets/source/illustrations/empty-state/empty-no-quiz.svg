<!--
  Empty-state 5 — Quiz (NEW; not wired to EmptyStateArt yet).
  Scene: clipboard with blank answer sheet, small mascot peeking over the top.
  NOTE per Kaisel §2.2: no mascot SVG source exists in repo. This paints a simple iconic
  peek-shape that reads as "friendly mascot" without re-drawing Mascot.tsx. The peek is
  iconic-only (round head + simple ears) and uses ds.colors.success (per Lyra spec).

  Output: empty-no-quiz.svg -> empty-no-quiz.png (240x240)

  palette (ds.colors only):
    ds.colors.brand (#2A6F97) - clipboard frame
    ds.colors.brandSoft (#E0F2FE) - clipboard body
    ds.colors.warm (#F4A261) - clip metal
    ds.colors.warmInk (#92400E) - clip band
    ds.colors.success (#2A9D8F) - mascot
    ds.colors.successSoft (#DCFCE7) - mascot body
    ds.colors.text (#0F172A) - outlines
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="Empty quiz state: a clipboard with a blank answer sheet and a small friendly mascot peeking over the top">
  <!-- Mascot peeking (top edge, only top half visible) -->
  <g transform="translate(120 28)">
    <!-- Ears (rounded triangles) -->
    <path d="M -22 -8 L -16 8 L -10 -4 Z" fill="#2A9D8F" stroke="#0F172A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 22 -8 L 16 8 L 10 -4 Z" fill="#2A9D8F" stroke="#0F172A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Head (round) -->
    <circle cx="0" cy="6" r="22" fill="#DCFCE7" stroke="#0F172A" stroke-width="3" stroke-linecap="round"/>
    <!-- Eyes (small dots) -->
    <circle cx="-7" cy="6" r="2" fill="#0F172A"/>
    <circle cx="7" cy="6" r="2" fill="#0F172A"/>
    <!-- Smile (small arc) -->
    <path d="M -6 14 Q 0 18 6 14" fill="none" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Clipboard (center-frame, focal) -->
  <g transform="translate(50 70)">
    <!-- Clipboard board (brand) -->
    <rect x="0" y="10" width="140" height="160" rx="6" fill="#2A6F97" stroke="#0F172A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Clip metal (warm) -->
    <rect x="50" y="0" width="40" height="22" rx="4" fill="#F4A261" stroke="#0F172A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="60" y="6" width="20" height="10" rx="2" fill="#92400E" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/>
    <!-- Answer sheet (brand-soft, blank, lined) -->
    <rect x="14" y="24" width="112" height="132" fill="#E0F2FE" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/>
    <!-- Sheet lines (5 blank answer lines) -->
    <line x1="24" y1="48" x2="116" y2="48" stroke="#64748B" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="24" y1="72" x2="116" y2="72" stroke="#64748B" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="24" y1="96" x2="116" y2="96" stroke="#64748B" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="24" y1="120" x2="116" y2="120" stroke="#64748B" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="24" y1="144" x2="116" y2="144" stroke="#64748B" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
