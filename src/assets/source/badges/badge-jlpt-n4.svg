<!--
  Badge 3 — N4 (jlptN4) — REFRESH (existing file overwritten to new visual recipe).
  Silhouette: SHIELD (visually distinct from streak7/N5 round badges).
  Center motif: "N4" in white, sans-serif weight 700-900.
  Palette: info purple — tier above blue without going gold.
  Export: 96x96 PNG.

  palette (ds.colors only):
    ds.colors.info (#7E57C2) - shield body
    ds.colors.infoSoft (#EDE9FE) - shield rim
    ds.colors.text (#0F172A) - outlines
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="JLPT N4 badge: the letters N4 on an info-purple shield">
  <!-- Shield silhouette -->
  <path d="M 32 4
           L 56 12
           L 56 30
           C 56 44 44 56 32 60
           C 20 56 8 44 8 30
           L 8 12 Z"
        fill="#7E57C2" stroke="#0F172A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Shield inner rim (white, following inner contour) -->
  <path d="M 32 8
           L 52 14
           L 52 30
           C 52 42 42 52 32 56
           C 22 52 12 42 12 30
           L 12 14 Z"
        fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
  <!-- N4 center text -->
  <text x="32" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="-0.5">N4</text>
</svg>
